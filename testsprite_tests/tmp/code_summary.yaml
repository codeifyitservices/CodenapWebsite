version: "2"
type: frontend
tech_stack:
  - HTML
  - JavaScript
  - React
  - React Router DOM
  - Tailwind CSS
  - Framer Motion
  - Lucide React
  - Vite
routes:
  - path: /
    file: src/pages/Home.jsx
    auth_required: false
    description: Landing and home page presenting the main agency site
  - path: /about
    file: src/pages/About.jsx
    auth_required: false
    description: Company overview and team info
  - path: /services
    file: src/pages/Services.jsx
    auth_required: false
    description: List of services offered by CodeNap
  - path: /services/:serviceId
    file: src/pages/ServiceDetailPage.jsx
    auth_required: false
    description: Detailed description of a specific service
  - path: /training
    file: src/pages/Training.jsx
    auth_required: false
    description: Training program overview and details
  - path: /contact
    file: src/pages/ContactBackup.jsx
    auth_required: false
    description: Contact page with query form
  - path: /careers
    file: src/pages/Careers.jsx
    auth_required: false
    description: Career opportunities and open roles
  - path: /admin/login
    file: src/pages/Admin/Login.jsx
    auth_required: false
    description: Admin authentication page
  - path: /admin
    file: src/pages/Admin/Dashboard.jsx
    auth_required: true
    description: Admin panel dashboard home
  - path: /admin/services
    file: src/pages/Admin/ManageServices.jsx
    auth_required: true
    description: Admin panel services manager with drag-and-drop reordering
  - path: /admin/faqs
    file: src/pages/Admin/ManageFAQs.jsx
    auth_required: true
    description: Admin panel FAQ editor
  - path: /admin/testimonials
    file: src/pages/Admin/ManageTestimonials.jsx
    auth_required: true
    description: Admin panel Testimonial manager
  - path: /admin/jobs
    file: src/pages/Admin/ManageJobs.jsx
    auth_required: true
    description: Admin panel Job listings editor
  - path: /admin/applications
    file: src/pages/Admin/ViewApplications.jsx
    auth_required: true
    description: Admin panel job applications viewer
  - path: /admin/contact-info
    file: src/pages/Admin/ManageContactInfo.jsx
    auth_required: true
    description: Admin panel contact information editor
features:
  - name: Admin Login
    description: Authenticates admin users using stored credentials and retrieves a JWT token.
    files:
      - src/pages/Admin/Login.jsx
      - src/components/AdminLayout.jsx
    entry_route: /admin/login
    user_interactions:
      - Enter username
      - Enter password
      - Click "Login" button
      - See redirection to Admin Dashboard on success or error message on failure
    api_calls:
      - method: POST
        endpoint: /api/auth/login
    auth_required: false
  - name: Service Reordering (Drag and Drop)
    description: Allows administrators to drag and drop service rows to reorder them in real-time.
    files:
      - src/pages/Admin/ManageServices.jsx
    entry_route: /admin/services
    user_interactions:
      - Grab grip handle (GripVertical icon) of a service row
      - Drag row up or down and drop it over another row
      - Table list swaps items dynamically
      - Save reordered sequence automatically on drag end
    api_calls:
      - method: PUT
        endpoint: /api/services/reorder
    auth_required: true
  - name: Service Management (CRUD)
    description: Create, read, update, and delete service offerings.
    files:
      - src/pages/Admin/ManageServices.jsx
    entry_route: /admin/services
    user_interactions:
      - Click "Add Service" to open create form
      - Fill in basic details, icon, features, steps, stats, and click "Save Service"
      - Click Edit (pencil icon) on a service to edit and click "Save Service" to submit changes
      - Click Delete (trash icon) and click OK to confirm deletion
    api_calls:
      - method: GET
        endpoint: /api/services
      - method: POST
        endpoint: /api/services
      - method: PUT
        endpoint: /api/services/:id
      - method: DELETE
        endpoint: /api/services/:id
    auth_required: true
known_limitations: []
